<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WattWise V2</title>
  <style>
    :root{
      --bg:#f4f6f8;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --green:#065f46;
      --green-2:#10b981;
      --red:#b91c1c;
      --amber:#b45309;
      --shadow:0 10px 24px rgba(0,0,0,.06);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .app{
      max-width:980px;
      margin:0 auto;
      padding:18px 14px 40px;
    }
    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
      font-size:22px;
    }
    .brand .bolt{font-size:26px}
    .sub{
      color:var(--muted);
      font-size:13px;
      margin-top:2px;
    }
    .row{
      display:grid;
      gap:14px;
    }
    .row-2{
      grid-template-columns:1fr;
    }
    @media(min-width:860px){
      .row-2{grid-template-columns:1.15fr .85fr}
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }
    .card h2,.card h3,.card h4{
      margin:0 0 10px 0;
    }
    .top-metrics{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:10px;
    }
    @media(min-width:680px){
      .top-metrics{grid-template-columns:repeat(4,1fr)}
    }
    .metric{
      background:#f9fafb;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
    }
    .metric .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
    }
    .metric .value{
      font-size:24px;
      font-weight:800;
    }
    .site-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:8px;
    }
    .site-item{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      cursor:pointer;
      background:#fff;
      transition:.15s ease;
    }
    .site-item:hover{transform:translateY(-1px)}
    .site-item.active{
      border-color:var(--green-2);
      background:#ecfdf5;
    }
    .site-item .title{
      font-weight:700;
      margin-bottom:4px;
    }
    .muted{color:var(--muted)}
    .money{
      font-weight:800;
      font-size:34px;
      line-height:1;
      margin:6px 0 2px;
    }
    .green{color:var(--green)}
    .small{
      font-size:12px;
      color:var(--muted);
    }
    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:#eef2ff;
      color:#3730a3;
      font-size:12px;
      font-weight:700;
    }
    .section{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid var(--border);
    }
    .grid{
      display:grid;
      gap:10px;
    }
    .grid-2{
      grid-template-columns:1fr 1fr;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .field label{
      font-size:12px;
      font-weight:700;
      color:var(--muted);
    }
    input, select, textarea, button{
      font:inherit;
    }
    input, select, textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 12px;
      background:white;
    }
    textarea{min-height:72px; resize:vertical}
    button{
      border:none;
      border-radius:12px;
      padding:11px 14px;
      font-weight:700;
      cursor:pointer;
    }
    .btn-primary{
      background:var(--green);
      color:#fff;
    }
    .btn-secondary{
      background:#e5e7eb;
      color:#111827;
    }
    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .equipment-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:8px;
    }
    .equip-card{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:#fff;
    }
    .equip-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .equip-name{
      font-weight:800;
    }
    .tag{
      display:inline-block;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      background:#f3f4f6;
      color:#374151;
      margin-top:8px;
      margin-right:6px;
    }
    .tag.high{background:#fee2e2;color:#991b1b}
    .tag.medium{background:#fef3c7;color:#92400e}
    .tag.low{background:#dcfce7;color:#166534}
    .calc-box{
      background:#ecfdf5;
      border:1px solid #bbf7d0;
      border-radius:14px;
      padding:12px;
    }
    .empty{
      padding:16px;
      border:1px dashed var(--border);
      border-radius:14px;
      color:var(--muted);
      text-align:center;
    }
    .footer-note{
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
    }
    .switch-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
    }
    .switch{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      font-weight:700;
    }
    .danger{
      color:var(--red);
      font-size:12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <div class="brand"><span class="bolt">⚡</span><span>WattWise</span></div>
        <div class="sub">Field calculator + saved sites + CUES mode</div>
      </div>
    </div>

    <div class="card">
      <h2>Dashboard</h2>
      <div class="top-metrics" id="dashboardMetrics"></div>
    </div>

    <div class="row row-2" style="margin-top:14px;">
      <div class="card">
        <h3>Sites</h3>
        <div class="btn-row" style="margin-bottom:10px;">
          <button class="btn-primary" id="showAddSiteBtn">+ Add Site</button>
        </div>

        <div id="addSitePanel" style="display:none;">
          <div class="grid grid-2">
            <div class="field">
              <label>Site Name</label>
              <input id="siteNameInput" placeholder="Robin's Mini Mart" />
            </div>
            <div class="field">
              <label>Client</label>
              <input id="clientInput" placeholder="Robin's Mini Mart" />
            </div>
            <div class="field">
              <label>Utility Rate ($/kWh)</label>
              <input id="rateInput" type="number" step="0.01" value="0.22" />
            </div>
            <div class="field">
              <label>Waste %</label>
              <input id="wasteInput" type="number" step="0.01" value="0.10" />
            </div>
          </div>
          <div class="btn-row" style="margin-top:10px;">
            <button class="btn-primary" id="addSiteBtn">Save Site</button>
            <button class="btn-secondary" id="cancelAddSiteBtn">Cancel</button>
          </div>
        </div>

        <div class="site-list" id="siteList"></div>
      </div>

      <div class="card" id="detailCard">
        <div id="siteDetail"></div>
      </div>
    </div>
  </div>

  <script>
    const appState = {
      selectedSiteId: 1,
      sites: [
        {
          id: 1,
          name: "Robins Mini Mart",
          client: "Robins Mini Mart",
          utilityRate: 0.22,
          wastePct: 0.10,
          cuesSavingsPct: 0.25,
          applyCues: true,
          nextAction: "Send CUES info",
          notes: "Gas station refrigeration opportunity. Start conservative.",
          equipment: [
            { id: 11, name: "Reach-in Fridge", loadKw: 1.5, issue: "Short Cycling", priority: "High" },
            { id: 12, name: "Reach-in Freezer", loadKw: 2.0, issue: "Short Cycling", priority: "High" }
          ]
        }
      ]
    };

    function currency(n) {
      return "$" + Math.round(n).toLocaleString();
    }

    function round1(n) {
      return Math.round(n * 10) / 10;
    }

    function getSite(siteId) {
      return appState.sites.find(s => s.id === siteId);
    }

    function totalLoad(site) {
      return site.equipment.reduce((sum, e) => sum + (Number(e.loadKw) || 0), 0);
    }

    function annualWaste(site) {
      return totalLoad(site) * 8760 * site.utilityRate * site.wastePct;
    }

    function monthlyWaste(site) {
      return annualWaste(site) / 12;
    }

    function monthlyAfterCues(site) {
      return monthlyWaste(site) * (1 - site.cuesSavingsPct);
    }

    function monthlySavings(site) {
      return monthlyWaste(site) - monthlyAfterCues(site);
    }

    function totalMonthlyWasteAll() {
      return appState.sites.reduce((sum, s) => sum + monthlyWaste(s), 0);
    }

    function totalAssetsAll() {
      return appState.sites.reduce((sum, s) => sum + s.equipment.length, 0);
    }

    function totalSitesAll() {
      return appState.sites.length;
    }

    function topOpportunity() {
      if (!appState.sites.length) return 0;
      return Math.max(...appState.sites.map(s => monthlyWaste(s)));
    }

    function renderDashboard() {
      const box = document.getElementById("dashboardMetrics");
      box.innerHTML = `
        <div class="metric">
          <div class="label">Sites</div>
          <div class="value">${totalSitesAll()}</div>
        </div>
        <div class="metric">
          <div class="label">Assets</div>
          <div class="value">${totalAssetsAll()}</div>
        </div>
        <div class="metric">
          <div class="label">Monthly Waste</div>
          <div class="value">${currency(totalMonthlyWasteAll())}</div>
        </div>
        <div class="metric">
          <div class="label">Top Opportunity</div>
          <div class="value">${currency(topOpportunity())}</div>
        </div>
      `;
    }

    function renderSites() {
      const siteList = document.getElementById("siteList");
      siteList.innerHTML = "";

      if (!appState.sites.length) {
        siteList.innerHTML = `<div class="empty">No sites yet. Add your first site.</div>`;
        return;
      }

      appState.sites.forEach(site => {
        const div = document.createElement("div");
        div.className = "site-item" + (site.id === appState.selectedSiteId ? " active" : "");
        div.innerHTML = `
          <div class="title">${site.name}</div>
          <div class="muted">${site.client || "No client"} • ${site.equipment.length} assets</div>
          <div style="margin-top:8px;font-weight:800;">${currency(monthlyWaste(site))}/mo waste</div>
        `;
        div.onclick = () => {
          appState.selectedSiteId = site.id;
          renderAll();
        };
        siteList.appendChild(div);
      });
    }

    function renderDetail() {
      const site = getSite(appState.selectedSiteId);
      const detail = document.getElementById("siteDetail");

      if (!site) {
        detail.innerHTML = `<div class="empty">Select a site.</div>`;
        return;
      }

      detail.innerHTML = `
        <div>
          <h2 style="margin-bottom:4px;">${site.name}</h2>
          <div class="muted">${site.client || ""}</div>
          <div class="money">${currency(monthlyWaste(site))}/mo</div>
          <div class="small">Estimated monthly waste</div>

          <div class="top-metrics" style="margin-top:14px;">
            <div class="metric">
              <div class="label">Total Load</div>
              <div class="value">${round1(totalLoad(site))}</div>
              <div class="small">kW</div>
            </div>
            <div class="metric">
              <div class="label">Annual Waste</div>
              <div class="value">${currency(annualWaste(site))}</div>
            </div>
            <div class="metric">
              <div class="label">Rate</div>
              <div class="value">${site.utilityRate.toFixed(2)}</div>
              <div class="small">$/kWh</div>
            </div>
            <div class="metric">
              <div class="label">Waste %</div>
              <div class="value">${Math.round(site.wastePct * 100)}%</div>
            </div>
          </div>

          <div class="section">
            <div class="switch-row">
              <h3 style="margin:0;">CUES Mode</h3>
              <label class="switch">
                <input type="checkbox" ${site.applyCues ? "checked" : ""} onchange="toggleCues(${site.id}, this.checked)" />
                Apply CUES
              </label>
            </div>
            <div class="calc-box">
              <div><strong>Baseline:</strong> ${currency(monthlyWaste(site))}/month</div>
              <div><strong>After CUES:</strong> ${site.applyCues ? currency(monthlyAfterCues(site)) + "/month" : "—"}</div>
              <div class="green" style="margin-top:6px;"><strong>Savings:</strong> ${site.applyCues ? currency(monthlySavings(site)) + "/month" : "—"}</div>
            </div>
            <div class="footer-note">Default CUES savings factor: ${Math.round(site.cuesSavingsPct * 100)}%</div>
          </div>

          <div class="section">
            <h3>Equipment</h3>
            <div class="equipment-list">
              ${site.equipment.length ? site.equipment.map(eq => `
                <div class="equip-card">
                  <div class="equip-top">
                    <div>
                      <div class="equip-name">${eq.name}</div>
                      <div class="muted">${round1(eq.loadKw)} kW</div>
                    </div>
                    <div class="tag ${eq.priority.toLowerCase()}">${eq.priority}</div>
                  </div>
                  <div class="tag">${eq.issue}</div>
                </div>
              `).join("") : `<div class="empty">No equipment yet.</div>`}
            </div>
          </div>

          <div class="section">
            <h3>Add Equipment</h3>
            <div class="grid grid-2">
              <div class="field">
                <label>Name</label>
                <input id="equipNameInput" placeholder="Walk-in Freezer" />
              </div>
              <div class="field">
                <label>Load (kW)</label>
                <input id="equipLoadInput" type="number" step="0.1" placeholder="2.0" />
              </div>
              <div class="field">
                <label>Issue</label>
                <select id="equipIssueInput">
                  <option>Short Cycling</option>
                  <option>Temperature Drift</option>
                  <option>Door Open Behavior</option>
                  <option>General Waste</option>
                </select>
              </div>
              <div class="field">
                <label>Priority</label>
                <select id="equipPriorityInput">
                  <option>High</option>
                  <option>Medium</option>
                  <option>Low</option>
                </select>
              </div>
            </div>
            <div class="btn-row" style="margin-top:10px;">
              <button class="btn-primary" onclick="addEquipment(${site.id})">Add Equipment</button>
            </div>
          </div>

          <div class="section">
            <h3>Next Action</h3>
            <div class="field">
              <input value="${site.nextAction || ""}" onchange="updateNextAction(${site.id}, this.value)" placeholder="Send proposal" />
            </div>
          </div>
        </div>
      `;
    }

    function renderAll() {
      renderDashboard();
      renderSites();
      renderDetail();
    }

    function toggleCues(siteId, checked) {
      const site = getSite(siteId);
      if (!site) return;
      site.applyCues = checked;
      renderAll();
    }

    function addEquipment(siteId) {
      const site = getSite(siteId);
      if (!site) return;

      const name = document.getElementById("equipNameInput").value.trim();
      const load = parseFloat(document.getElementById("equipLoadInput").value);
      const issue = document.getElementById("equipIssueInput").value;
      const priority = document.getElementById("equipPriorityInput").value;

      if (!name || Number.isNaN(load)) {
        alert("Enter equipment name and load.");
        return;
      }

      site.equipment.push({
        id: Date.now(),
        name,
        loadKw: load,
        issue,
        priority
      });

      renderAll();
    }

    function updateNextAction(siteId, value) {
      const site = getSite(siteId);
      if (!site) return;
      site.nextAction = value;
    }

    document.getElementById("showAddSiteBtn").onclick = () => {
      document.getElementById("addSitePanel").style.display = "block";
    };

    document.getElementById("cancelAddSiteBtn").onclick = () => {
      document.getElementById("addSitePanel").style.display = "none";
    };

    document.getElementById("addSiteBtn").onclick = () => {
      const name = document.getElementById("siteNameInput").value.trim();
      const client = document.getElementById("clientInput").value.trim();
      const rate = parseFloat(document.getElementById("rateInput").value);
      const waste = parseFloat(document.getElementById("wasteInput").value);

      if (!name || Number.isNaN(rate) || Number.isNaN(waste)) {
        alert("Enter site name, rate, and waste %.");
        return;
      }

      const newSite = {
        id: Date.now(),
        name,
        client,
        utilityRate: rate,
        wastePct: waste,
        cuesSavingsPct: 0.25,
        applyCues: false,
        nextAction: "",
        notes: "",
        equipment: []
      };

      appState.sites.unshift(newSite);
      appState.selectedSiteId = newSite.id;

      document.getElementById("siteNameInput").value = "";
      document.getElementById("clientInput").value = "";
      document.getElementById("rateInput").value = "0.22";
      document.getElementById("wasteInput").value = "0.10";
      document.getElementById("addSitePanel").style.display = "none";

      renderAll();
    };

    renderAll();
  </script>
</body>
</html>
